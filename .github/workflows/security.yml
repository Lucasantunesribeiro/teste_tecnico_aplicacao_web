name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      images: ${{ steps.detect.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > changed_files.txt
          else
            git ls-files > changed_files.txt
          fi

          if grep -Eq '^(backend/|docker-compose(\.prod)?\.yml|\.github/workflows/security\.yml)' changed_files.txt; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(frontend/|docker-compose(\.prod)?\.yml|\.github/workflows/security\.yml)' changed_files.txt; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(backend/|frontend/|docker-compose(\.prod)?\.yml|\.github/workflows/security\.yml)' changed_files.txt; then
            echo "images=true" >> "$GITHUB_OUTPUT"
          else
            echo "images=false" >> "$GITHUB_OUTPUT"
          fi

  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
            echo "Scanning commit range: $RANGE"
            gitleaks git --redact --no-banner --exit-code 1 --log-opts="$RANGE"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            echo "Scanning commit range: $RANGE"
            gitleaks git --redact --no-banner --exit-code 1 --log-opts="$RANGE"
          else
            echo "Scanning full repository history"
            gitleaks git --redact --no-banner --exit-code 1
          fi

  dependency-check:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: OWASP Dependency Check
        # -DfailOnError=false: não aborta por falhas de infra (throttling da NVD API)
        # -DfailBuildOnCVSS=7: falha se houver CVE com CVSS >= 7 nas dependências de runtime
        # -DnvdValidForHours=168: reutiliza a base de dados NVD em cache por 7 dias
        run: >
          mvn -B org.owasp:dependency-check-maven:check
          -Dformat=HTML
          -DfailOnError=false
          -DfailBuildOnCVSS=7
          -DdataDirectory=$HOME/.cache/dependency-check
          -DnvdValidForHours=168
          -DnvdApiKeyEnvironmentVariable=NVD_API_KEY

  npm-audit:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

  image-scan:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: usuarios-backend:ci
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: usuarios-frontend:ci
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan backend image
        id: scan_backend
        continue-on-error: true
        run: trivy image --scanners vuln --pkg-types library --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH --format sarif --output backend-trivy.sarif usuarios-backend:ci

      - name: Scan frontend image
        id: scan_frontend
        continue-on-error: true
        run: trivy image --scanners vuln --pkg-types library --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH --format sarif --output frontend-trivy.sarif usuarios-frontend:ci

      - name: Upload backend scan
        if: always() && (steps.scan_backend.outcome == 'success' || steps.scan_backend.outcome == 'failure')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-trivy.sarif
          category: trivy-backend-image

      - name: Upload frontend scan
        if: always() && (steps.scan_frontend.outcome == 'success' || steps.scan_frontend.outcome == 'failure')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-trivy.sarif
          category: trivy-frontend-image

      - name: Fail if vulnerabilities were found
        if: always()
        run: |
          if [ "${{ steps.scan_backend.outcome }}" = "failure" ] || [ "${{ steps.scan_frontend.outcome }}" = "failure" ]; then
            echo "Trivy found HIGH or CRITICAL vulnerabilities."
            exit 1
          fi
