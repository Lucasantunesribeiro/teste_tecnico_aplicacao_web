name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["javascript", "java"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=HTML

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit all dependencies
        run: npm audit

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t usuarios-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t usuarios-frontend:ci ./frontend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: usuarios-backend:ci
          format: sarif
          output: backend-trivy.sarif

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: usuarios-frontend:ci
          format: sarif
          output: frontend-trivy.sarif

      - name: Upload backend scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-trivy.sarif

      - name: Upload frontend scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-trivy.sarif
