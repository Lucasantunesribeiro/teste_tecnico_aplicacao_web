name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Backend verify
        run: mvn verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Runtime audit
        run: npm audit --omit=dev

  security:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java for dependency check
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven dependency check
        working-directory: backend
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Build backend image
        run: docker build -t usuarios-backend-ci ./backend

      - name: Build frontend image
        run: docker build -t usuarios-frontend-ci ./frontend

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy backend image scan
        run: trivy image --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH --format table usuarios-backend-ci

      - name: Trivy frontend image scan
        run: trivy image --exit-code 1 --ignore-unfixed --severity CRITICAL,HIGH --format table usuarios-frontend-ci
